<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2f855a"/>
      <stop offset="100%" style="stop-color:#276749"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg2)"/>
  <!-- Trees -->
  <g fill="#48bb78" opacity="0.3">
    <polygon points="150,280 100,180 50,280"/>
    <polygon points="200,280 140,160 80,280"/>
    <polygon points="700,280 650,180 600,280"/>
    <polygon points="750,280 680,150 610,280"/>
  </g>
  <!-- Deer/Target icon -->
  <g transform="translate(400, 170)" fill="none" stroke="#9ae6b4" stroke-width="3">
    <!-- Target circles -->
    <circle cx="0" cy="0" r="70"/>
    <circle cx="0" cy="0" r="50"/>
    <circle cx="0" cy="0" r="30"/>
    <circle cx="0" cy="0" r="10" fill="#9ae6b4"/>
    <!-- Crosshairs -->
    <line x1="-80" y1="0" x2="-40" y2="0"/>
    <line x1="40" y1="0" x2="80" y2="0"/>
    <line x1="0" y1="-80" x2="0" y2="-40"/>
    <line x1="0" y1="40" x2="0" y2="80"/>
  </g>
  <text x="400" y="300" font-family="system-ui, sans-serif" font-size="24" font-weight="600" fill="#c6f6d5" text-anchor="middle">Concessione Caccia</text>
  <text x="400" y="330" font-family="system-ui, sans-serif" font-size="14" fill="#9ae6b4" text-anchor="middle">Tassa Regionale per l'Esercizio Venatorio</text>
</svg>
